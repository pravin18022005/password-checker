version: "3.9"

# ── CipherGuard Full Stack ──
# Usage: docker-compose up --build

services:

  # ── MongoDB ───────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: cipherguard_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: cipherguard
    volumes:
      - mongo_data:/data/db
    networks:
      - cipherguard_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask Backend ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cipherguard_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FLASK_DEBUG=false
      - PORT=5000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - cipherguard_net
    volumes:
      - ./backend:/app

  # ── Nginx Frontend Server ─────────────
  frontend:
    image: nginx:alpine
    container_name: cipherguard_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - cipherguard_net

volumes:
  mongo_data:
    driver: local

networks:
  cipherguard_net:
    driver: bridge